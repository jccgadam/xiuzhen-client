<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="600" viewBox="0 0 400 600">
  <defs>
    <linearGradient id="hall" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a20"/>
      <stop offset="100%" style="stop-color:#0d0d12"/>
    </linearGradient>
  </defs>
  <rect fill="url(#hall)" width="400" height="600"/>
  <!-- 大殿 -->
  <polygon points="200,100 50,200 50,450 350,450 350,200" fill="#1a1a25" stroke="#3a3a50" stroke-width="2"/>
  <!-- 屋顶 -->
  <polygon points="200,50 30,180 370,180" fill="#2a2a35" stroke="#4a4a60" stroke-width="2"/>
  <!-- 柱子 -->
  <rect x="80" y="200" width="20" height="250" fill="#2a2a35"/>
  <rect x="300" y="200" width="20" height="250" fill="#2a2a35"/>
  <!-- 匾额 -->
  <rect x="130" y="220" width="140" height="50" fill="#3a3040"/>
  <text x="200" y="252" fill="#7a7090" font-size="20" text-anchor="middle">戒律堂</text>
  <!-- 案桌 -->
  <rect x="150" y="380" width="100" height="30" fill="#2a2530"/>
  <!-- 卷宗 -->
  <rect x="170" y="365" width="20" height="15" fill="#4a4550"/>
  <rect x="200" y="365" width="20" height="15" fill="#4a4550"/>
  <text x="200" y="550" fill="#5a5a70" font-size="24" text-anchor="middle" font-family="serif">戒律堂</text>
</svg>
